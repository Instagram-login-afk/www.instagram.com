<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Service Unavailable</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #ffffff;
      color: #222222;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
    }

    .container {
      max-width: 500px;
      padding: 40px;
      border-radius: 12px;
      background: #f5f5f5;
      box-shadow: 0 8px 20px rgba(0,0,0,0.1);
    }

    h1 {
      font-size: 48px;
      margin-bottom: 10px;
    }

    p {
      font-size: 18px;
      opacity: 0.9;
    }

    .status {
      margin-top: 20px;
      font-size: 14px;
      color: #d32f2f;
      letter-spacing: 1px;
    }

    .spinner {
      margin: 25px auto;
      width: 50px;
      height: 50px;
      border: 5px solid rgba(0,0,0,0.1);
      border-top: 5px solid #333333;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>503</h1>
    <p><strong>Service Not Available</strong></p>
    <div class="spinner"></div>
    <p>We're experiencing unexpected issues.<br>Please try again later.</p>
    <div class="status">SYSTEM STATUS: DOWN</div>
  </div>
</body>
</html>
